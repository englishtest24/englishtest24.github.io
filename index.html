<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест VARK: Как вы учите английский?</title>
    <style>
        :root {
            --v-color: #3498db;
            --a-color: #e67e22;
            --r-color: #2ecc71;
            --k-color: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        
        .site-desc {
            text-align: center;
            font-size: 1.1rem;
            color: #7f8c8d;
            margin-bottom: 40px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .question-block {
            margin-bottom: 35px;
            padding: 25px;
            background: #fff;
            border: 1px solid #e1e8ed;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .question-block:hover { border-color: #3498db; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .question-text { font-weight: 600; font-size: 1.1rem; display: block; margin-bottom: 20px; }

        .options-row {
            display: flex;
            justify-content: space-between;
            gap: 5px;
        }

        .option-label {
            flex: 1;
            text-align: center;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: #7f8c8d;
        }

        .option-label input { width: 18px; height: 18px; cursor: pointer; }

        .main-btn {
            display: block; width: 100%; padding: 20px;
            background: #2c3e50; color: white; border: none;
            border-radius: 12px; font-size: 1.2rem; cursor: pointer;
            transition: background 0.3s; margin-top: 20px;
        }
        .main-btn:hover { background: #34495e; }

        /* Стили результатов */
        #result-section { display: none; }
        
        .winner-card {
            background: #fff;
            border-top: 8px solid;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .combine-title {
            text-align: center;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin: 40px 0 20px;
        }

        .secondary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .secondary-card {
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
        }

        .type-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        ul { padding-left: 20px; margin: 10px 0; }
        li { margin-bottom: 5px; }

        @media (max-width: 600px) {
            .options-row { flex-direction: column; gap: 12px; }
            .option-label { flex-direction: row; text-align: left; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Типы запоминания лексики (VARK)</h1>
    <p class="site-desc">
        С помощью этого теста вы сможете прорефлексировать свои способности в изучении английских слов и выражений и понять, как Вам лучше запоминать лексику на основе модели VARK.
    </p>
    
    <div id="quiz-ui">
        <form id="vark-form">
            <div id="questions-wrapper"></div>
            <button type="submit" class="main-btn">Показать мой профиль обучения</button>
        </form>
    </div>

    <div id="result-section">
        <div id="winner-output"></div>
        <div class="combine-title">Можно комбинировать с:</div>
        <div class="secondary-grid" id="others-output"></div>
        <button onclick="location.reload()" class="main-btn" style="background: #95a5a6; margin-top: 40px;">Пройти тест заново</button>
    </div>
</div>

<script>
    const content = {
        "V": {
            name: "Визуальный (Visual)",
            color: "#3498db",
            desc: "Вы лучше всего усваиваете информацию через зрительные образы, графику и пространственные связи.",
            methods: ["Использование карточек с картинками", "Создание интеллект-карт (Mind-maps)", "Цветовое кодирование частей речи", "Просмотр видео с инфографикой"]
        },
        "A": {
            name: "Аудиальный (Auditory)",
            color: "#e67e22",
            desc: "Для вас эффективнее всего слушать, обсуждать и проговаривать информацию вслух.",
            methods: ["Метод Shadowing (повтор за диктором)", "Прослушивание подкастов", "Обсуждение слов в паре/группе", "Запись своей речи на диктофон"]
        },
        "R": {
            name: "Чтение/Письмо (Read/Write)",
            color: "#2ecc71",
            desc: "Вы предпочитаете работать с печатным словом: списками, словарями и конспектами.",
            methods: ["Ведение бумажного словаря", "Чтение статей и книг", "Многократное прописывание слов", "Составление письменных предложений"]
        },
        "K": {
            name: "Кинестетический (Kinesthetic)",
            color: "#e74c3c",
            desc: "Ваш мозг запоминает через действия, практику, физические ощущения и личный опыт.",
            methods: ["Использование жестов (метод TPR)", "Карточки, которые можно перекладывать", "Применение слов в живой ситуации", "Обучение во время движения/прогулки"]
        }
    };

    const questions = [
        { id: 1, type: "V", text: "Я лучше запоминаю слово, если вижу его рядом с яркой иллюстрацией." },
        { id: 2, type: "V", text: "Цветовые маркеры помогают мне лучше структурировать записи." },
        { id: 3, type: "V", text: "Мне легче учить слова через схемы и ментальные карты." },
        { id: 4, type: "V", text: "Я легко вспоминаю, как слово выглядело на странице учебника." },
        { id: 5, type: "A", text: "Я быстро усваиваю слова из песен, подкастов или видео." },
        { id: 6, type: "A", text: "Проговаривание слов вслух — самый эффективный способ для меня." },
        { id: 7, type: "A", text: "Мне легче запомнить фразу, если я уловлю её ритм или интонацию." },
        { id: 8, type: "A", text: "Я часто повторяю слова за диктором, чтобы закрепить их в памяти." },
        { id: 9, type: "R", text: "Я лучше запоминаю слова через текстовые определения в словаре." },
        { id: 10, type: "R", text: "Ведение классического словаря — мой основной метод." },
        { id: 11, type: "R", text: "Чтобы выучить слово, мне нужно прописать его несколько раз." },
        { id: 12, type: "R", text: "Я предпочитаю учить лексику, читая статьи или субтитры." },
        { id: 13, type: "K", text: "Я эффективнее запоминаю глаголы, если сопровождаю их жестами." },
        { id: 14, type: "K", text: "Мне важно сразу применить слово в живой ситуации (в магазине, в диалоге)." },
        { id: 15, type: "K", text: "Работа с бумажными карточками, которые можно трогать, помогает мне лучше приложений." },
        { id: 16, type: "K", text: "Я лучше запоминаю слова, когда учу их во время прогулки или движения." }
    ];

    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    const wrapper = document.getElementById('questions-wrapper');
    const scale = [
        "Совершенно не согласен",
        "Скорее не согласен",
        "Иногда верно",
        "Скорее согласен",
        "Полностью согласен"
    ];

    shuffle(questions).forEach((q, idx) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question-block';
        qDiv.innerHTML = `
            <span class="question-text">${idx+1}. ${q.text}</span>
            <div class="options-row">
                ${scale.map((label, val) => `
                    <label class="option-label">
                        <input type="radio" name="q${q.id}" value="${val}" required>
                        <span>${label}</span>
                    </label>
                `).join('')}
            </div>
        `;
        wrapper.appendChild(qDiv);
    });

    document.getElementById('vark-form').onsubmit = function(e) {
        e.preventDefault();
        const scores = { V: 0, A: 0, R: 0, K: 0 };
        const data = new FormData(this);

        questions.forEach(q => {
            scores[q.type] += parseInt(data.get(`q${q.id}`));
        });

        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        window.scrollTo(0, 0);

        const winner = sorted[0];
        const winnerInfo = content[winner[0]];
        
        document.getElementById('winner-output').innerHTML = `
            <div class="winner-card" style="border-color: ${winnerInfo.color}">
                <span class="type-tag" style="background: ${winnerInfo.color}">Ваш основной тип</span>
                <h2 style="margin: 10px 0;">${winnerInfo.name} — ${winner[1]} баллов</h2>
                <p>${winnerInfo.desc}</p>
                <p><strong>Рекомендуемые методы:</strong></p>
                <ul>${winnerInfo.methods.map(m => `<li>${m}</li>`).join('')}</ul>
            </div>
        `;

        const othersBox = document.getElementById('others-output');
        sorted.slice(1).forEach(item => {
            const info = content[item[0]];
            othersBox.innerHTML += `
                <div class="secondary-card">
                    <span class="type-tag" style="background: #95a5a6">${info.name}</span>
                    <p style="font-size: 0.85rem; margin: 5px 0;"><strong>Баллы: ${item[1]}</strong></p>
                    <details style="font-size: 0.85rem;">
                        <summary>Показать методы</summary>
                        <ul>${info.methods.map(m => `<li>${m}</li>`).join('')}</ul>
                    </details>
                </div>
            `;
        });
    };
</script>

</body>
</html>
